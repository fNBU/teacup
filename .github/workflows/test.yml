name: test

on:
  push:
    branches: [trunk]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      # Both tools ship release binaries; the runner's glibc (>= 2.38 on
      # ubuntu-latest) satisfies the luacheck binary.
      - name: Install lua-language-server and luacheck
        run: |
          mkdir -p "$HOME/.local/opt/lls" "$HOME/.local/bin"
          curl -sfL https://github.com/LuaLS/lua-language-server/releases/download/3.18.2/lua-language-server-3.18.2-linux-x64.tar.gz \
            | tar xz -C "$HOME/.local/opt/lls"
          ln -s "$HOME/.local/opt/lls/bin/lua-language-server" "$HOME/.local/bin/"
          curl -sfL -o "$HOME/.local/bin/luacheck" \
            https://github.com/lunarmodules/luacheck/releases/download/v1.2.0/luacheck
          chmod +x "$HOME/.local/bin/luacheck"

      - name: Run static analysis
        run: just check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Line one is the minimal TeX set teacup is designed for (see README);
      # if it ever needs to grow, that is a regression in itself.
      # texlive-latex-extra, texlive-xetex and lmodern are NOT needed by
      # teacup: they satisfy Quarto's own PDF machinery (xurl/framed/upquote,
      # the xelatex engine, its fonts, and the base-35 metrics hyperref needs) for the PDF e2e
      # tests.
      - name: Install TeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-pictures texlive-latex-recommended texlive-plain-generic dvisvgm \
            texlive-latex-extra texlive-xetex texlive-fonts-recommended lmodern

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.7.32

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run tests
        run: just test
